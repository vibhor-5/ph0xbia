<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MONSKILLS</title>
<style>
:root {
  --bg: #0E091C;
  --fg: #c8d0e8;
  --dim: #8490b0;
  --accent: #8B75FF;
  --border: #2d2245;
  --hover: #150e28;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header bar */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1.5rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.back-link {
  color: var(--dim);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  transition: color 0.15s;
}
.back-link:hover { color: var(--fg); text-decoration: none; }
.back-link svg { width: 14px; height: 14px; }
.skill-title {
  color: var(--accent);
  font-size: 15px;
  font-weight: 600;
}
.copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: inherit;
  font-size: 12px;
  padding: 0.3rem 0.6rem;
  border-radius: 3px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.copy-btn:hover {
  border-color: var(--accent);
  background: rgba(139, 117, 255, 0.05);
}
.copy-btn svg {
  width: 12px;
  height: 12px;
  flex-shrink: 0;
}

/* Main layout */
.main {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* Sidebar */
.sidebar {
  width: 280px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 0.75rem 0;
}
.sidebar-item {
  display: block;
  padding: 0.6rem 1.25rem;
  cursor: pointer;
  transition: background 0.1s;
  text-decoration: none;
  border-left: 3px solid transparent;
}
.sidebar-item:hover {
  background: var(--hover);
  text-decoration: none;
}
.sidebar-item.active {
  background: var(--hover);
  border-left-color: var(--accent);
}
.sidebar-item-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--fg);
}
.sidebar-item.active .sidebar-item-name { color: var(--accent); }
.sidebar-item-desc {
  color: var(--dim);
  font-size: 12px;
  margin-top: 0.15rem;
  line-height: 1.4;
}

/* Content area */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 2rem;
  min-width: 0;
}

/* Markdown styles */
.content h1, .content h2, .content h3 { color: var(--accent); margin: 1.25em 0 0.5em 0; font-weight: 600; }
.content h1 { font-size: 1.35em; }
.content h2 { font-size: 1.15em; text-transform: none; letter-spacing: normal; border-bottom: none; padding-bottom: 0; }
.content h3 { font-size: 1.05em; }
.content p { margin: 0.75em 0; }
.content ul, .content ol { margin: 0.75em 0; padding-left: 1.5em; }
.content li { margin: 0.35em 0; }
.content code { background: var(--hover); color: var(--accent); padding: 0.15em 0.4em; border-radius: 3px; font-size: 0.92em; }
.content pre { background: var(--hover); border: 1px solid var(--border); border-radius: 3px; padding: 1rem; overflow-x: auto; margin: 1em 0; }
.content pre code { background: none; padding: 0; color: var(--fg); }
.content blockquote { border-left: 3px solid var(--accent); margin: 1em 0; padding-left: 1em; color: var(--dim); }
.content table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 13px; }
.content th, .content td { border: 1px solid var(--border); padding: 0.4rem 0.6rem; text-align: left; }
.content th { background: var(--hover); color: var(--accent); }
.content a { color: var(--accent); }
.content strong { color: var(--fg); font-weight: 600; }

.loading { color: var(--dim); padding: 2rem 0; }
.error { color: #d4605f; padding: 2rem 0; }

/* Mobile */
@media (max-width: 700px) {
  .main { flex-direction: column; }
  .sidebar {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: 40vh;
  }
  .sidebar-item { border-left: none; border-bottom: 1px solid var(--border); }
  .sidebar-item.active { border-left: none; border-bottom-color: var(--accent); }
  .content { padding: 1rem; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="/" class="back-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Back</a>
    <span class="skill-title" id="skill-title">Skills</span>
  </div>
  <button class="copy-btn" id="copy-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> <span id="copy-label">Copy URL</span></button>
</div>

<div class="main">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="content" id="content">
    <p class="loading">Select a skill to view its documentation.</p>
  </div>
</div>

<script>
const SKILLS = [
  { id: 'scaffold', name: 'Scaffold', desc: 'End-to-end guide from idea to production. Project structure, onchain decisions, OpenZeppelin contracts.' },
  { id: 'why-monad', name: 'Why Monad', desc: '10,000 tps, 400ms block time, 800ms finality, and full Ethereum compatibility.' },
  { id: 'addresses', name: 'Addresses', desc: 'Smart contract addresses for well known protocols on Monad. Testnet and mainnet.' },
  { id: 'wallet', name: 'Wallet', desc: 'Agent wallet management, Safe multisig creation, and deploying contracts via Safe.' },
  { id: 'wallet-integration', name: 'Wallet Integration', desc: 'Integrate wallet connection into a Next.js app using RainbowKit with Wagmi and viem.' },
  { id: 'vercel-deploy', name: 'Vercel Deploy', desc: 'Deploy to Vercel without CLI or auth. Returns a preview URL and claim URL.' }
];

const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');
const titleEl = document.getElementById('skill-title');
const copyBtn = document.getElementById('copy-btn');
const copyLabel = document.getElementById('copy-label');

// Build sidebar
SKILLS.forEach(skill => {
  const item = document.createElement('a');
  item.className = 'sidebar-item';
  item.href = 'skill.html?name=' + skill.id;
  item.dataset.skill = skill.id;
  item.innerHTML = '<div class="sidebar-item-name">' + skill.name + '</div><div class="sidebar-item-desc">' + skill.desc + '</div>';
  item.addEventListener('click', (e) => {
    e.preventDefault();
    loadSkill(skill.id);
    history.pushState(null, '', 'skill.html?name=' + skill.id);
  });
  sidebar.appendChild(item);
});

function loadSkill(id) {
  const skill = SKILLS.find(s => s.id === id);
  if (!skill) return;

  const skillUrl = 'https://skills.devnads.com/' + id + '/SKILL.md';

  // Update header
  document.title = skill.name + ' — MONSKILLS';
  titleEl.textContent = skill.name;
  copyLabel.textContent = id + '/SKILL.md';

  // Update active sidebar item
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.skill === id);
  });

  // Load content
  content.innerHTML = '<p class="loading">Loading...</p>';
  fetch(id + '/SKILL.md')
    .then(r => { if (!r.ok) throw new Error(r.statusText); return r.text(); })
    .then(text => { content.innerHTML = renderMarkdown(text); content.scrollTop = 0; })
    .catch(err => {
      content.innerHTML = '<p class="error">Could not load skill: ' + escHtml(err.message) + '.</p>';
    });
}

// Copy URL
copyBtn.addEventListener('click', async () => {
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  if (!name) return;
  const url = 'https://skills.devnads.com/' + name + '/SKILL.md';
  try { await navigator.clipboard.writeText(url); } catch(err) {
    const t = document.createElement('textarea'); t.value = url; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
  }
  const orig = copyBtn.innerHTML;
  copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
  setTimeout(() => { copyBtn.innerHTML = orig; }, 1500);
});

// Handle back/forward
window.addEventListener('popstate', () => {
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  if (name && SKILLS.find(s => s.id === name)) loadSkill(name);
});

// Load initial skill from URL or default to first
const params = new URLSearchParams(window.location.search);
const initial = params.get('name');
if (initial && SKILLS.find(s => s.id === initial)) {
  loadSkill(initial);
} else {
  loadSkill(SKILLS[0].id);
  history.replaceState(null, '', 'skill.html?name=' + SKILLS[0].id);
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderMarkdown(md) {
  const esc = escHtml;
  const inline = s => esc(s)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  let raw = md.replace(/\r\n?/g, '\n');
  if (raw.startsWith('---\n')) {
    const end = raw.indexOf('\n---', 4);
    if (end !== -1) raw = raw.slice(end + 4).replace(/^\n+/, '');
  }
  let out = '';
  const lines = raw.split('\n');
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^```(\w*)\s*$/.test(line)) {
      let block = '';
      for (i++; i < lines.length && !/^```\s*$/.test(lines[i]); i++) block += esc(lines[i]) + '\n';
      i++;
      out += '<pre><code>' + block + '</code></pre>';
      continue;
    }
    if (/^(#{1,3})\s+(.+)$/.test(line)) {
      const l = RegExp.$1.length;
      out += '<h' + l + '>' + inline(RegExp.$2) + '</h' + l + '>';
      i++;
      continue;
    }
    if (/^\|.+\|$/.test(line)) {
      const rows = [];
      while (i < lines.length && /^\|.+\|$/.test(lines[i])) {
        if (!/^\|[-:\s|]+\|$/.test(lines[i])) {
          rows.push(lines[i].split('|').slice(1, -1).map(c => c.trim()));
        }
        i++;
      }
      if (rows.length) {
        out += '<table><thead><tr>';
        rows[0].forEach(c => { out += '<th>' + inline(c) + '</th>'; });
        out += '</tr></thead><tbody>';
        for (let r = 1; r < rows.length; r++) {
          out += '<tr>';
          rows[r].forEach(c => { out += '<td>' + inline(c) + '</td>'; });
          out += '</tr>';
        }
        out += '</tbody></table>';
      }
      continue;
    }
    if (/^>\s?(.*)$/.test(line)) {
      let block = inline(RegExp.$1);
      for (i++; i < lines.length && /^>\s?(.*)$/.test(lines[i]); i++) block += '\n' + inline(RegExp.$1);
      out += '<blockquote>' + block.replace(/\n/g, '<br>') + '</blockquote>';
      continue;
    }
    if (/^[-*]\s+(.+)$/.test(line)) {
      out += '<ul>';
      while (i < lines.length && /^[-*]\s+(.+)$/.test(lines[i])) {
        out += '<li>' + inline(RegExp.$1) + '</li>';
        i++;
      }
      out += '</ul>';
      continue;
    }
    if (/^\d+\.\s+(.+)$/.test(line)) {
      out += '<ol>';
      while (i < lines.length && /^\d+\.\s+(.+)$/.test(lines[i])) {
        out += '<li>' + inline(RegExp.$1) + '</li>';
        i++;
      }
      out += '</ol>';
      continue;
    }
    if (line.trim() === '') { i++; continue; }
    out += '<p>' + inline(line) + '</p>';
    i++;
  }
  return out;
}
</script>
</body>
</html>
